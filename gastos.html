<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Control de Gastos Personales</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --danger: #dc2626;
      --success: #16a34a;
      --warning: #d97706;
      --bg: #f1f5f9;
      --card: #ffffff;
      --border: #e2e8f0;
      --text: #1e293b;
      --muted: #64748b;
      --radius: 12px;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--primary);
      color: #fff;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,.15);
    }
    header h1 { font-size: 1.4rem; font-weight: 700; }
    header span { font-size: .85rem; opacity: .8; }

    /* ── Layout ── */
    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px 16px;
      display: grid;
      gap: 20px;
    }

    /* ── Cards ── */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,.07);
    }
    .card-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .04em;
      margin-bottom: 12px;
    }

    /* ── Summary Row ── */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
    }
    .summary-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,.07);
      border-left: 4px solid var(--primary);
    }
    .summary-card.danger  { border-color: var(--danger); }
    .summary-card.success { border-color: var(--success); }
    .summary-card.warning { border-color: var(--warning); }
    .summary-card .label  { font-size: .8rem; color: var(--muted); margin-bottom: 6px; }
    .summary-card .amount { font-size: 1.6rem; font-weight: 700; }
    .summary-card.danger  .amount { color: var(--danger); }
    .summary-card.success .amount { color: var(--success); }
    .summary-card.warning .amount { color: var(--warning); }

    /* ── Form ── */
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
    }
    .form-group { display: flex; flex-direction: column; gap: 4px; }
    .form-group label { font-size: .8rem; font-weight: 600; color: var(--muted); }
    .form-group input,
    .form-group select,
    .form-group textarea {
      padding: 10px 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: .95rem;
      color: var(--text);
      background: var(--bg);
      transition: border-color .15s;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--primary);
      background: #fff;
    }
    .form-group.full { grid-column: 1 / -1; }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-danger  { background: var(--danger); color: #fff; }
    .btn-sm      { padding: 6px 12px; font-size: .82rem; }
    .btn-outline {
      background: transparent;
      border: 1.5px solid var(--border);
      color: var(--muted);
    }
    .btn-outline:hover { border-color: var(--primary); color: var(--primary); }

    .form-actions {
      display: flex;
      gap: 10px;
      margin-top: 4px;
      flex-wrap: wrap;
    }

    /* ── Filters ── */
    .filters {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: flex-end;
    }
    .filters .form-group { flex: 1; min-width: 130px; }

    /* ── Table ── */
    .table-wrapper { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: .9rem;
    }
    th {
      text-align: left;
      padding: 10px 12px;
      background: var(--bg);
      color: var(--muted);
      font-weight: 600;
      font-size: .78rem;
      text-transform: uppercase;
      letter-spacing: .04em;
      white-space: nowrap;
    }
    td { padding: 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f8fafc; }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 99px;
      font-size: .75rem;
      font-weight: 600;
    }

    .cat-badge { color: #fff; }

    .amount-cell { font-weight: 700; text-align: right; white-space: nowrap; }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }
    .empty-state .icon { font-size: 3rem; margin-bottom: 8px; }

    /* ── Chart ── */
    .chart-container { position: relative; }
    .bars { display: flex; flex-direction: column; gap: 10px; }
    .bar-row { display: flex; align-items: center; gap: 10px; }
    .bar-label { width: 110px; font-size: .82rem; color: var(--muted); flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .bar-track { flex: 1; background: var(--bg); border-radius: 99px; height: 14px; overflow: hidden; }
    .bar-fill  { height: 100%; border-radius: 99px; transition: width .4s ease; }
    .bar-value { width: 70px; text-align: right; font-size: .82rem; font-weight: 600; flex-shrink: 0; }

    /* ── Month nav ── */
    .month-nav {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .month-nav button { background: var(--bg); border: 1.5px solid var(--border); border-radius: 8px; padding: 6px 12px; cursor: pointer; font-weight: 600; color: var(--text); }
    .month-nav button:hover { border-color: var(--primary); color: var(--primary); }
    #monthLabel { font-weight: 700; font-size: 1rem; min-width: 160px; text-align: center; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #1e293b;
      color: #fff;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: .9rem;
      font-weight: 600;
      box-shadow: 0 4px 16px rgba(0,0,0,.2);
      opacity: 0;
      transform: translateY(8px);
      transition: opacity .25s, transform .25s;
      pointer-events: none;
      z-index: 9999;
    }
    #toast.show { opacity: 1; transform: translateY(0); }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      header h1 { font-size: 1.1rem; }
      .form-grid { grid-template-columns: 1fr 1fr; }
      .bar-label { width: 80px; }
    }
  </style>
</head>
<body>

<header>
  <h1>💰 Control de Gastos Personales</h1>
  <span id="headerDate"></span>
</header>

<main>

  <!-- Summary -->
  <div class="summary-grid">
    <div class="summary-card danger">
      <div class="label">Gasto este mes</div>
      <div class="amount" id="sumMonth">0,00 €</div>
    </div>
    <div class="summary-card warning">
      <div class="label">Promedio diario</div>
      <div class="amount" id="sumAvg">0,00 €</div>
    </div>
    <div class="summary-card success">
      <div class="label">Total registrado</div>
      <div class="amount" id="sumTotal">0,00 €</div>
    </div>
    <div class="summary-card">
      <div class="label">Transacciones</div>
      <div class="amount" id="sumCount">0</div>
    </div>
  </div>

  <!-- Add Expense -->
  <div class="card">
    <div class="card-title">Nuevo Gasto</div>
    <div class="form-grid" id="expenseForm">
      <div class="form-group">
        <label for="fDate">Fecha</label>
        <input type="date" id="fDate" />
      </div>
      <div class="form-group">
        <label for="fAmount">Importe (€)</label>
        <input type="number" id="fAmount" placeholder="0,00" min="0" step="0.01" />
      </div>
      <div class="form-group">
        <label for="fCategory">Categoría</label>
        <select id="fCategory">
          <option value="">-- Selecciona --</option>
          <option value="Alimentación">🛒 Alimentación</option>
          <option value="Transporte">🚗 Transporte</option>
          <option value="Vivienda">🏠 Vivienda</option>
          <option value="Salud">💊 Salud</option>
          <option value="Ocio">🎉 Ocio</option>
          <option value="Ropa">👕 Ropa</option>
          <option value="Tecnología">💻 Tecnología</option>
          <option value="Educación">📚 Educación</option>
          <option value="Restaurantes">🍽️ Restaurantes</option>
          <option value="Otros">📦 Otros</option>
        </select>
      </div>
      <div class="form-group full">
        <label for="fDesc">Descripción</label>
        <input type="text" id="fDesc" placeholder="Ej: Compra supermercado" />
      </div>
      <div class="form-group full form-actions">
        <button class="btn btn-primary" onclick="addExpense()">+ Añadir gasto</button>
        <button class="btn btn-outline" onclick="clearForm()">Limpiar</button>
        <button class="btn btn-outline" onclick="exportCSV()" style="margin-left:auto">⬇ Exportar CSV</button>
      </div>
    </div>
  </div>

  <!-- Chart -->
  <div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; margin-bottom:16px;">
      <div class="card-title" style="margin:0">Gasto por categoría</div>
      <div class="month-nav">
        <button onclick="changeMonth(-1)">&#8592;</button>
        <span id="monthLabel"></span>
        <button onclick="changeMonth(1)">&#8594;</button>
      </div>
    </div>
    <div id="chartBars" class="bars"></div>
  </div>

  <!-- Expense List -->
  <div class="card">
    <div class="card-title">Historial de gastos</div>
    <div class="filters" style="margin-bottom:16px;">
      <div class="form-group">
        <label>Categoría</label>
        <select id="filterCat" onchange="renderList()">
          <option value="">Todas</option>
          <option value="Alimentación">🛒 Alimentación</option>
          <option value="Transporte">🚗 Transporte</option>
          <option value="Vivienda">🏠 Vivienda</option>
          <option value="Salud">💊 Salud</option>
          <option value="Ocio">🎉 Ocio</option>
          <option value="Ropa">👕 Ropa</option>
          <option value="Tecnología">💻 Tecnología</option>
          <option value="Educación">📚 Educación</option>
          <option value="Restaurantes">🍽️ Restaurantes</option>
          <option value="Otros">📦 Otros</option>
        </select>
      </div>
      <div class="form-group">
        <label>Desde</label>
        <input type="date" id="filterFrom" onchange="renderList()" />
      </div>
      <div class="form-group">
        <label>Hasta</label>
        <input type="date" id="filterTo" onchange="renderList()" />
      </div>
      <div class="form-group">
        <label>Buscar</label>
        <input type="text" id="filterSearch" placeholder="Descripción..." oninput="renderList()" />
      </div>
      <button class="btn btn-outline btn-sm" onclick="clearFilters()" style="align-self:flex-end; height:42px;">Limpiar</button>
    </div>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Fecha</th>
            <th>Descripción</th>
            <th>Categoría</th>
            <th style="text-align:right">Importe</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="expenseTable"></tbody>
      </table>
    </div>
  </div>

</main>

<div id="toast"></div>

<script>
/* ── Data ── */
const STORAGE_KEY = 'gastos_personales_v1';
let expenses = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');

let viewYear  = new Date().getFullYear();
let viewMonth = new Date().getMonth(); // 0-based

/* ── Category colours ── */
const CAT_COLORS = {
  'Alimentación': '#16a34a',
  'Transporte':   '#2563eb',
  'Vivienda':     '#7c3aed',
  'Salud':        '#dc2626',
  'Ocio':         '#db2777',
  'Ropa':         '#d97706',
  'Tecnología':   '#0891b2',
  'Educación':    '#065f46',
  'Restaurantes': '#ea580c',
  'Otros':        '#64748b',
};

/* ── Helpers ── */
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(expenses)); }

function fmt(n) {
  return n.toLocaleString('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' €';
}

function todayISO() {
  const d = new Date();
  return d.toISOString().slice(0, 10);
}

function isoToDisplay(iso) {
  const [y, m, d] = iso.split('-');
  return `${d}/${m}/${y}`;
}

function toast(msg, ms = 2400) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), ms);
}

/* ── Unique ID ── */
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

/* ── Init ── */
document.getElementById('fDate').value = todayISO();
document.getElementById('headerDate').textContent = new Date().toLocaleDateString('es-ES', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
updateMonthLabel();
renderAll();

/* ── Add expense ── */
function addExpense() {
  const date     = document.getElementById('fDate').value;
  const amount   = parseFloat(document.getElementById('fAmount').value);
  const category = document.getElementById('fCategory').value;
  const desc     = document.getElementById('fDesc').value.trim();

  if (!date)            return toast('⚠️ Selecciona una fecha');
  if (!amount || amount <= 0) return toast('⚠️ Introduce un importe válido');
  if (!category)        return toast('⚠️ Selecciona una categoría');
  if (!desc)            return toast('⚠️ Añade una descripción');

  expenses.unshift({ id: uid(), date, amount, category, desc });
  save();
  renderAll();
  toast('✅ Gasto añadido');
  document.getElementById('fAmount').value = '';
  document.getElementById('fDesc').value   = '';
  document.getElementById('fCategory').value = '';
}

/* ── Delete expense ── */
function deleteExpense(id) {
  if (!confirm('¿Eliminar este gasto?')) return;
  expenses = expenses.filter(e => e.id !== id);
  save();
  renderAll();
  toast('🗑️ Gasto eliminado');
}

/* ── Clear form ── */
function clearForm() {
  document.getElementById('fAmount').value   = '';
  document.getElementById('fDesc').value     = '';
  document.getElementById('fCategory').value = '';
  document.getElementById('fDate').value     = todayISO();
}

/* ── Clear filters ── */
function clearFilters() {
  document.getElementById('filterCat').value    = '';
  document.getElementById('filterFrom').value   = '';
  document.getElementById('filterTo').value     = '';
  document.getElementById('filterSearch').value = '';
  renderList();
}

/* ── Filtered list ── */
function filteredExpenses() {
  const cat    = document.getElementById('filterCat').value;
  const from   = document.getElementById('filterFrom').value;
  const to     = document.getElementById('filterTo').value;
  const search = document.getElementById('filterSearch').value.toLowerCase();

  return expenses.filter(e => {
    if (cat    && e.category !== cat)                  return false;
    if (from   && e.date < from)                       return false;
    if (to     && e.date > to)                         return false;
    if (search && !e.desc.toLowerCase().includes(search)) return false;
    return true;
  });
}

/* ── Render all ── */
function renderAll() {
  renderSummary();
  renderChart();
  renderList();
}

/* ── Summary ── */
function renderSummary() {
  const now  = new Date();
  const yy   = now.getFullYear();
  const mm   = String(now.getMonth() + 1).padStart(2, '0');
  const prefix = `${yy}-${mm}`;

  const monthTotal = expenses
    .filter(e => e.date.startsWith(prefix))
    .reduce((s, e) => s + e.amount, 0);

  const daysInMonth = new Date(yy, now.getMonth() + 1, 0).getDate();
  const daysPassed  = now.getDate();
  const avg = daysPassed > 0 ? monthTotal / daysPassed : 0;

  const total = expenses.reduce((s, e) => s + e.amount, 0);

  document.getElementById('sumMonth').textContent = fmt(monthTotal);
  document.getElementById('sumAvg').textContent   = fmt(avg);
  document.getElementById('sumTotal').textContent = fmt(total);
  document.getElementById('sumCount').textContent = expenses.length;
}

/* ── Chart ── */
function updateMonthLabel() {
  const d = new Date(viewYear, viewMonth, 1);
  document.getElementById('monthLabel').textContent =
    d.toLocaleDateString('es-ES', { month: 'long', year: 'numeric' });
}

function changeMonth(dir) {
  viewMonth += dir;
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  if (viewMonth < 0)  { viewMonth = 11; viewYear--; }
  updateMonthLabel();
  renderChart();
}

function renderChart() {
  const prefix = `${viewYear}-${String(viewMonth + 1).padStart(2, '0')}`;

  const byCategory = {};
  expenses
    .filter(e => e.date.startsWith(prefix))
    .forEach(e => { byCategory[e.category] = (byCategory[e.category] || 0) + e.amount; });

  const entries = Object.entries(byCategory).sort((a, b) => b[1] - a[1]);
  const max     = entries.length ? entries[0][1] : 0;
  const container = document.getElementById('chartBars');

  if (!entries.length) {
    container.innerHTML = '<p style="color:var(--muted);text-align:center;padding:20px 0">Sin gastos este mes</p>';
    return;
  }

  container.innerHTML = entries.map(([cat, val]) => `
    <div class="bar-row">
      <div class="bar-label" title="${cat}">${cat}</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${(val/max*100).toFixed(1)}%;background:${CAT_COLORS[cat] || '#64748b'}"></div>
      </div>
      <div class="bar-value" style="color:${CAT_COLORS[cat] || '#64748b'}">${fmt(val)}</div>
    </div>
  `).join('');
}

/* ── List ── */
function renderList() {
  const list = filteredExpenses();
  const tbody = document.getElementById('expenseTable');

  if (!list.length) {
    tbody.innerHTML = `
      <tr><td colspan="5">
        <div class="empty-state">
          <div class="icon">📭</div>
          <div>No hay gastos que mostrar</div>
        </div>
      </td></tr>`;
    return;
  }

  tbody.innerHTML = list.map(e => `
    <tr>
      <td style="white-space:nowrap;color:var(--muted)">${isoToDisplay(e.date)}</td>
      <td>${escapeHtml(e.desc)}</td>
      <td>
        <span class="badge cat-badge" style="background:${CAT_COLORS[e.category] || '#64748b'}">${e.category}</span>
      </td>
      <td class="amount-cell">${fmt(e.amount)}</td>
      <td>
        <button class="btn btn-danger btn-sm" onclick="deleteExpense('${e.id}')">Eliminar</button>
      </td>
    </tr>
  `).join('');
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── CSV Export ── */
function exportCSV() {
  if (!expenses.length) return toast('No hay datos para exportar');

  const header = ['Fecha', 'Descripción', 'Categoría', 'Importe'];
  const rows   = expenses.map(e => [e.date, `"${e.desc.replace(/"/g,'""')}"`, e.category, e.amount.toFixed(2)]);

  const csv  = [header, ...rows].map(r => r.join(';')).join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `gastos_${todayISO()}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  toast('📥 Exportación completada');
}

/* ── Keyboard shortcut: Enter submits form ── */
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.activeElement.closest('#expenseForm')) {
    addExpense();
  }
});
</script>
</body>
</html>
